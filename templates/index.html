<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm Công AI | Tự Động</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); /* Pastel nhẹ nhàng */
            --card-bg: rgba(255, 255, 255, 0.9);
            --primary: #6c5ce7;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #ff7675;
            --text-dark: #2d3436;
            --text-light: #636e72;
            --shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-dark);
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Header với đồng hồ thời gian thực */
        .header { margin-bottom: 25px; }
        .header h1 { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        .realtime-clock { font-size: 32px; font-weight: 700; color: var(--text-dark); letter-spacing: 1px; font-variant-numeric: tabular-nums; }
        .status-badge-auto { 
            display: inline-block; margin-top: 10px; padding: 6px 16px; 
            border-radius: 20px; font-size: 14px; font-weight: 800; text-transform: uppercase;
            background: #dfe6e9; color: var(--text-light); transition: all 0.3s;
        }
        .status-badge-auto.mode-in { background: var(--success); color: white; box-shadow: 0 4px 15px rgba(0, 184, 148, 0.4); }
        .status-badge-auto.mode-out { background: var(--danger); color: white; box-shadow: 0 4px 15px rgba(255, 118, 117, 0.4); }

        /* Camera Frame */
        .camera-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            border: 5px solid white;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Khung quét tự động */
        .scan-frame {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; height: 70%;
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 16px;
            box-shadow: 0 0 0 999px rgba(0,0,0,0.6);
            pointer-events: none;
        }
        .scan-line {
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: scan 2s linear infinite;
            opacity: 0.8;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* Trạng thái hoạt động */
        .activity-log {
            background: #f1f2f6;
            border-radius: 16px;
            padding: 15px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .log-text { font-size: 16px; color: var(--text-light); font-weight: 600; }
        .log-highlight { font-size: 18px; font-weight: 800; color: var(--primary); margin-top: 4px; display: block; }
        
        .activity-log.success { background: var(--success); color: white; transform: scale(1.02); }
        .activity-log.success .log-text, .activity-log.success .log-highlight { color: white; }
        
        .activity-log.waiting { background: var(--warning); color: #d35400; }
        .activity-log.waiting .log-text { color: #d35400; }

        /* Nút điều khiển nhỏ */
        .controls { display: flex; gap: 10px; justify-content: center; }
        .btn-small {
            padding: 10px 20px; border: none; border-radius: 12px;
            font-weight: 700; cursor: pointer; font-size: 13px;
            background: white; color: var(--text-dark);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        .btn-small:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
        .btn-excel { background: var(--success); color: white; }

        /* Toast */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .toast {
            background: white; padding: 15px 20px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex; align-items: center; gap: 12px;
            min-width: 300px; margin-top: 10px;
            transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            border-left: 6px solid var(--primary);
        }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left-color: var(--success); }
        .toast-icon { font-size: 20px; color: var(--success); }
        .toast-content strong { display: block; font-size: 15px; }
        .toast-content small { color: var(--text-light); font-size: 13px; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-robot"></i> Chấm Công Tự Động</h1>
            <div class="realtime-clock" id="clock">00:00:00</div>
            <div id="modeBadge" class="status-badge-auto mode-in">
                <i class="fas fa-sign-in-alt"></i> Đang chế độ: CHECK-IN
            </div>
        </div>

        <div class="camera-wrapper">
            <video id="video" autoplay playsinline></video>
            <div class="scan-frame">
                <div class="scan-line"></div>
            </div>
        </div>

        <!-- Khu vực hiển thị trạng thái -->
        <div id="activityLog" class="activity-log">
            <span class="log-text"><i class="fas fa-spinner fa-spin"></i> Đang quét khuôn mặt...</span>
            <span class="log-highlight" id="lastAction">Chờ phát hiện</span>
        </div>

        <div class="controls">
            <button class="btn-small" onclick="togglePause()" id="pauseBtn">
                <i class="fas fa-pause"></i> Tạm dừng
            </button>
            <button class="btn-small btn-excel" onclick="downloadExcel()">
                <i class="fas fa-file-excel"></i> Xuất Excel
            </button>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <canvas id="canvas"></canvas>

    <script>
        const SERVER_URL = 'http://localhost:5000/api/checkin';
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const clockEl = document.getElementById('clock');
        const modeBadge = document.getElementById('modeBadge');
        const activityLog = document.getElementById('activityLog');
        const lastActionEl = document.getElementById('lastAction');
        const pauseBtn = document.getElementById('pauseBtn');

        let isPaused = false;
        let lastScanTime = 0;
        const SCAN_INTERVAL = 2000; // Quét mỗi 2 giây để tránh spam server
        const COOLDOWN_TIME = 300000; // 5 phút cooldown sau khi check-in thành công cho 1 người

        // Lưu trữ thời gian check-in cuối cùng của từng người để tránh trùng lặp
        // Format: { "NV001": 171234567890 }
        let userCooldowns = {}; 

        // 1. Đồng hồ thời gian thực & Tự động đổi chế độ
        function updateClock() {
            const now = new Date();
            clockEl.innerText = now.toLocaleTimeString('vi-VN');
            
            // Tự động xác định chế độ dựa trên giờ
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const currentTimeVal = hours * 60 + minutes;

            // Quy ước: Trước 13h00 là Check-in, sau 13h00 là Check-out
            // Bạn có thể sửa ngưỡng này tùy ý
            const threshold = 13 * 60; 
            
            if (currentTimeVal < threshold) {
                setModeVisual('checkin');
            } else {
                setModeVisual('checkout');
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        function setModeVisual(mode) {
            if (mode === 'checkin') {
                modeBadge.innerHTML = '<i class="fas fa-sign-in-alt"></i> Chế độ: CHECK-IN (Vào ca)';
                modeBadge.className = 'status-badge-auto mode-in';
            } else {
                modeBadge.innerHTML = '<i class="fas fa-sign-out-alt"></i> Chế độ: CHECK-OUT (Tan ca)';
                modeBadge.className = 'status-badge-auto mode-out';
            }
        }

        // 2. Khởi động Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } });
                video.srcObject = stream;
                requestAnimationFrame(processFrame); // Bắt đầu vòng lặp xử lý
            } catch (err) {
                showToast('error', 'Lỗi Camera', 'Không thể truy cập camera.');
            }
        }
        startCamera();

        // 3. Vòng lặp xử lý khung hình (Auto Scan)
        async function processFrame() {
            if (!isPaused && video.readyState === video.HAVE_ENOUGH_DATA) {
                const now = Date.now();
                
                // Chỉ gửi ảnh lên server nếu đã đủ thời gian quét (SCAN_INTERVAL)
                if (now - lastScanTime > SCAN_INTERVAL) {
                    captureAndSendAuto();
                    lastScanTime = now;
                }
            }
            requestAnimationFrame(processFrame);
        }

        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                pauseBtn.innerHTML = '<i class="fas fa-play"></i> Tiếp tục';
                activityLog.className = 'activity-log waiting';
                lastActionEl.innerText = "Đã tạm dừng";
            } else {
                pauseBtn.innerHTML = '<i class="fas fa-pause"></i> Tạm dừng';
                activityLog.className = 'activity-log';
                lastActionEl.innerText = "Đang quét...";
                lastScanTime = 0; // Reset để quét ngay
            }
        }

        async function captureAndSendAuto() {
            // Xác định mode hiện tại dựa trên giờ
            const now = new Date();
            const hours = now.getHours();
            const currentMode = (hours < 13) ? 'checkin' : 'checkout';

            const tempCanvas = document.createElement('canvas');
            const width = 640, height = 480;
            tempCanvas.width = width; tempCanvas.height = height;
            const ctx = tempCanvas.getContext('2d');
            ctx.drawImage(video, 0, 0, width, height);
            const imageData = tempCanvas.toDataURL('image/jpeg', 0.7);

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); // Timeout ngắn hơn cho auto

                const payload = { 
                    image: imageData, 
                    mode: currentMode 
                    // Không gửi reg_id/reg_name vì đây là mode auto
                };

                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const data = await response.json();

                if (data.success) {
                    const pid = data.id;
                    const name = data.name;
                    const nowTs = Date.now();

                    // Kiểm tra Cooldown cho người này
                    if (userCooldowns[pid] && (nowTs - userCooldowns[pid] < COOLDOWN_TIME)) {
                        // Vẫn trong thời gian chờ, không làm gì cả hoặc hiển thị nhẹ
                        // console.log(`User ${pid} đang trong cooldown`);
                    } else {
                        // Thành công thật sự -> Cập nhật UI và Cooldown
                        userCooldowns[pid] = nowTs;
                        
                        const badgeText = data.type === 'CHECK_IN' ? 'VÀO CA' : 'TAN CA';
                        const colorClass = data.type === 'CHECK_IN' ? 'success' : 'waiting'; // Màu xanh hoặc cam
                        
                        activityLog.className = `activity-log success`;
                        lastActionEl.innerHTML = `
                            <i class="fas fa-check-circle"></i> ${name}<br>
                            <small style="font-weight:600; font-size:14px; opacity:0.9">${badgeText} lúc ${data.timestamp.split(' - ')[0]}</small>
                        `;
                        
                        showToast('success', 'Thành Công', `${name} đã ${badgeText.toLowerCase()}!`);
                        
                        // Reset trạng thái log sau 3 giây
                        setTimeout(() => {
                            if(!isPaused) {
                                activityLog.className = 'activity-log';
                                lastActionEl.innerText = "Chờ phát hiện tiếp theo...";
                            }
                        }, 4000);
                    }
                } else {
                    // Không tìm thấy mặt hoặc giả mạo -> Reset log nhẹ nhàng
                    if(data.type !== 'UNKNOWN') {
                         // Chỉ hiện log nếu lỗi nghiêm trọng (như giả mạo)
                         if(data.type === 'SPOOF') {
                             activityLog.className = 'activity-log waiting';
                             lastActionEl.innerText = "⚠️ Phát hiện giả mạo!";
                             setTimeout(() => { if(!isPaused) { activityLog.className='activity-log'; lastActionEl.innerText="Chờ phát hiện..."} }, 2000);
                         }
                    }
                }
            } catch (error) {
                console.error("Auto scan error:", error);
            }
        }

        async function downloadExcel() {
            // Giữ nguyên hàm xuất excel như cũ
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang tải...';
            try {
                const response = await fetch('/api/export-excel');
                if (!response.ok) throw new Error('Lỗi');
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                let filename = "Bao_Cao_Cham_Cong.xlsx";
                const disposition = response.headers.get('Content-Disposition');
                if (disposition && disposition.indexOf('attachment') !== -1) {
                    const matches = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/.exec(disposition);
                    if (matches != null && matches[1]) filename = matches[1].replace(/['"]/g, '');
                }
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                showToast('success', 'Thành Công', 'Đã tải báo cáo Excel!');
            } catch (error) {
                showToast('error', 'Thất Bại', error.message);
            } finally {
                btn.innerHTML = originalText;
            }
        }

        function showToast(type, title, message) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = type === 'success' ? 'fa-check-circle' : 'fa-times-circle';
            toast.innerHTML = `<i class="fas ${icon} toast-icon"></i><div class="toast-content"><strong>${title}</strong><small>${message}</small></div>`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 4000);
        }
    </script>
</body>
</html>
