<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Chấm Công AI | Đa Chức Năng</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4e54c8; --secondary: #8f94fb;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --dark: #1f2937; --light: #6b7280;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-radius: 24px; padding: 30px; width: 100%; max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center;
        }
        .header h1 { font-size: 22px; color: var(--dark); margin-bottom: 5px; display:flex; align-items:center; justify-content:center; gap:10px; }
        .header p { color: var(--light); font-size: 13px; margin-bottom: 20px; }

        .mode-switcher {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px;
            background: #f3f4f6; padding: 5px; border-radius: 12px;
        }
        .mode-btn {
            border: none; background: transparent; padding: 10px 5px;
            font-size: 12px; font-weight: 600; color: var(--light);
            cursor: pointer; border-radius: 8px; transition: all 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .mode-btn i { font-size: 16px; margin-bottom: 2px; }
        .mode-btn.active {
            background: white; color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); transform: translateY(-2px);
        }
        .mode-btn.register.active { color: var(--warning); }
        .mode-btn.checkin.active { color: var(--success); }
        .mode-btn.checkout.active { color: var(--danger); }

        .camera-wrapper {
            position: relative; width: 100%; aspect-ratio: 4/3;
            background: #000; border-radius: 16px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60%; height: 60%; border: 2px solid rgba(255,255,255,0.6);
            border-radius: 12px; box-shadow: 0 0 0 999px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .overlay::before {
            content:''; position:absolute; inset:-2px; border-radius:12px;
            border: 2px solid transparent; border-top-color: currentColor; border-bottom-color: currentColor;
            animation: spin 3s linear infinite;
        }

        .action-btn {
            width: 100%; padding: 16px; border: none; border-radius: 50px;
            font-size: 16px; font-weight: 600; color: white;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 4px 15px rgba(78, 84, 200, 0.4);
        }
        .action-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(78, 84, 200, 0.6); }
        .action-btn:disabled { background: #d1d5db; cursor: not-allowed; transform: none; box-shadow: none; }
        
        body.mode-register .action-btn { background: linear-gradient(135deg, var(--warning), #fbbf24); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4); }
        body.mode-checkin .action-btn { background: linear-gradient(135deg, var(--success), #34d399); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        body.mode-checkout .action-btn { background: linear-gradient(135deg, var(--danger), #f87171); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        body.mode-register .overlay { color: var(--warning); }
        body.mode-checkin .overlay { color: var(--success); }
        body.mode-checkout .overlay { color: var(--danger); }

        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: white; padding: 15px 20px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 12px;
            min-width: 320px; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            border-left: 5px solid;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.warning { border-left-color: var(--warning); }
        .toast-icon { font-size: 20px; }
        .toast.success .toast-icon { color: var(--success); }
        .toast.error .toast-icon { color: var(--danger); }
        .toast.warning .toast-icon { color: var(--warning); }
        
        .toast-content strong { display: block; margin-bottom: 4px; color: var(--dark); font-size: 15px; }
        .toast-content small { color: var(--light); font-size: 11px; line-height: 1.4; display: block; margin-top: 4px; }
        
        .status-badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 10px; font-weight: 700; margin-top: 6px; text-transform: uppercase;
        }
        .status-badge.checkin { background: #d1fae5; color: #065f46; }
        .status-badge.checkout { background: #fee2e2; color: #991b1b; }

        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px;
            text-align: left; animation: fadeIn 0.3s;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: var(--dark); }
        .form-group input {
            width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px;
            font-family: inherit; outline: none; transition: border 0.2s;
        }
        .form-group input:focus { border-color: var(--primary); }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-confirm { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-ok { background: var(--primary); color: white; }
        .btn-cancel { background: #e5e7eb; color: var(--dark); }

        @media (max-width: 480px) {
            .toast-container { right: 50%; transform: translateX(50%); width: 90%; }
            .mode-switcher { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="mode-checkin">

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-id-card-clip"></i> Chấm Công AI</h1>
            <p id="mode-desc">Chế độ: Check-In (Vào ca)</p>
        </div>

        <div class="mode-switcher">
            <button class="mode-btn register" onclick="setMode('register')">
                <i class="fas fa-user-plus"></i> Đăng Ký
            </button>
            <button class="mode-btn checkin active" onclick="setMode('checkin')">
                <i class="fas fa-sign-in-alt"></i> Check-In
            </button>
            <button class="mode-btn checkout" onclick="setMode('checkout')">
                <i class="fas fa-sign-out-alt"></i> Check-Out
            </button>
        </div>

        <div class="camera-wrapper">
            <video id="video" autoplay playsinline></video>
            <div class="overlay"></div>
        </div>

        <button id="actionBtn" class="action-btn" onclick="handleAction()">
            <span class="btn-text"><i class="fas fa-camera"></i> Điểm Danh Ngay</span>
            <div class="spinner"></div>
        </button>

        <!-- NÚT XUẤT EXCEL -->
        <button class="action-btn" onclick="downloadExcel()" style="margin-top: 15px; background: linear-gradient(135deg, #10b981, #34d399); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);">
            <i class="fas fa-file-excel"></i> Xuất Báo Cáo Excel
        </button>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <canvas id="canvas"></canvas>

    <!-- Modal Đăng Ký -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; color: var(--dark);"><i class="fas fa-user-plus" style="color: var(--warning)"></i> Đăng Ký Người Mới</h2>
            <div class="form-group">
                <label>Mã Nhân Viên/Sinh Viên</label>
                <input type="text" id="regId" placeholder="Ví dụ: NV001">
            </div>
            <div class="form-group">
                <label>Họ và Tên</label>
                <input type="text" id="regName" placeholder="Ví dụ: Nguyen Van A">
            </div>
            <div class="modal-actions">
                <button class="btn-confirm btn-cancel" onclick="closeModal()">Hủy</button>
                <button class="btn-confirm btn-ok" onclick="confirmRegistration()">Chụp & Lưu</button>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'checkin';
        const SERVER_URL = 'http://localhost:5000/api/checkin'; 
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const actionBtn = document.getElementById('actionBtn');
        const btnText = actionBtn.querySelector('.btn-text');
        const spinner = actionBtn.querySelector('.spinner');
        const modeDesc = document.getElementById('mode-desc');
        const modal = document.getElementById('registerModal');

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } });
                video.srcObject = stream;
            } catch (err) {
                showToast('error', 'Lỗi Camera', 'Không thể truy cập camera.');
            }
        }
        startCamera();

        function setMode(mode) {
            currentMode = mode;
            document.body.className = `mode-${mode}`;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.mode-btn.${mode}`).classList.add('active');

            if(mode === 'register') {
                modeDesc.innerText = "Chế độ: Đăng Ký Người Mới";
                btnText.innerHTML = '<i class="fas fa-user-plus"></i> Đăng Ký Khuôn Mặt';
            } else if (mode === 'checkin') {
                modeDesc.innerText = "Chế độ: Check-In (Vào ca)";
                btnText.innerHTML = '<i class="fas fa-sign-in-alt"></i> Check-In Ngay';
            } else {
                modeDesc.innerText = "Chế độ: Check-Out (Tan ca)";
                btnText.innerHTML = '<i class="fas fa-sign-out-alt"></i> Check-Out Ngay';
            }
        }

        function handleAction() {
            if (currentMode === 'register') {
                document.getElementById('regId').value = '';
                document.getElementById('regName').value = '';
                modal.style.display = 'flex';
                document.getElementById('regId').focus();
            } else {
                captureAndSend(currentMode);
            }
        }

        function closeModal() { modal.style.display = 'none'; }

        function confirmRegistration() {
            const id = document.getElementById('regId').value.trim();
            const name = document.getElementById('regName').value.trim();
            if (!id || !name) { alert('Vui lòng điền đầy đủ Mã và Tên!'); return; }
            closeModal();
            captureAndSend('register', id, name);
        }

        async function captureAndSend(mode, regId = null, regName = null) {
            actionBtn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';

            try {
                const tempCanvas = document.createElement('canvas');
                const width = 640, height = 480;
                tempCanvas.width = width; tempCanvas.height = height;
                const ctx = tempCanvas.getContext('2d');
                ctx.drawImage(video, 0, 0, width, height);
                const imageData = tempCanvas.toDataURL('image/jpeg', 0.7);

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 120000);

                const payload = { image: imageData, mode: mode, reg_id: regId, reg_name: regName };

                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const data = await response.json();

                if (data.success) {
                    if (mode === 'register') {
                        showToast('success', 'Đăng Ký Thành Công', `
                            Đã lưu khuôn mặt cho <strong>${regName}</strong> (${regId})<br>
                            <small><i class="far fa-clock"></i> ${data.timestamp || new Date().toLocaleTimeString('vi-VN')}</small>
                        `);
                    } else {
                        const badgeClass = data.type === 'CHECK_IN' ? 'checkin' : 'checkout';
                        const badgeText = data.type === 'CHECK_IN' ? 'VÀO CA' : 'TAN CA';
                        
                        showToast('success', 'Điểm Danh Thành Công', `
                            <strong>${data.name}</strong> (${data.id})<br>
                            <span class="status-badge ${badgeClass}">${badgeText}</span><br>
                            <small><i class="far fa-clock"></i> ${data.timestamp}</small>
                        `);
                    }
                } else {
                    if (data.type === 'SPOOF') showToast('warning', 'Giả Mạo!', 'Phát hiện ảnh chụp/màn hình.');
                    else if (data.type === 'UNKNOWN' && mode !== 'register') showToast('error', 'Không Tìm Thấy', 'Khuôn mặt chưa được đăng ký.');
                    else showToast('error', 'Thất Bại', data.message);
                }
            } catch (error) {
                showToast('error', 'Lỗi Hệ Thống', error.message.includes('fetch') ? 'Mất kết nối Server' : error.message);
            } finally {
                actionBtn.disabled = false;
                btnText.style.display = 'inline-flex';
                spinner.style.display = 'none';
            }
        }

        async function downloadExcel() {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang tạo file...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/export-excel');
                
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.message || 'Không thể xuất file');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                
                const disposition = response.headers.get('Content-Disposition');
                let filename = "Bao_Cao_Cham_Cong.xlsx";
                if (disposition && disposition.indexOf('attachment') !== -1) {
                    const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                    const matches = filenameRegex.exec(disposition);
                    if (matches != null && matches[1]) { 
                        filename = matches[1].replace(/['"]/g, '');
                    }
                }
                
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                
                showToast('success', 'Thành Công', 'Đã tải xuống báo cáo Excel thành công!');
            } catch (error) {
                showToast('error', 'Thất Bại', error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function showToast(type, title, message) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-times-circle' : 'fa-exclamation-triangle');
            toast.innerHTML = `<i class="fas ${icon} toast-icon"></i><div class="toast-content"><strong>${title}</strong>${message}</div>`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 6000);
        }

        window.onclick = function(event) { if (event.target == modal) closeModal(); }
    </script>
</body>
</html>
